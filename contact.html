<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=devaaice-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="contact.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.13.0/css/all.css"
    />
    <title>Contact</title>
  </head>
  <body>
    <center>
      <nav class="navbar">
        <div class="nav-logo">
          <a href="/">
            <img
              class="navbar-logo"
              src="https://res.cloudinary.com/dxdboxbyb/image/upload/v1610988952/portfolio/ihxksogju1vefvisr2jz.svg"
              alt="logo"
          /></a>
        </div>
        <div class="nav-items">
          <ul>
            <li><a href="/cv.html">CV</a></li>
            <li>
              <a href="/projects.html">Projects</a>
            </li>
            <li><a href="/contact.html">Contact</a></li>
          </ul>
        </div>
      </nav>
    </center>
    <div class="container">
      <div class="contact-box">
        <div class="contact-info">
          <h1>Let's Get In Touch.</h1>
          <p>
            Want to discuss a project, an idea, an opportunity? Just fill up
            this form or write me an email
          </p>
        </div>
        <form
          name="contact"
          id="contact-form"
          method="post"
          data-netlify="true"
        >
          <div class="form-group">
            <label for="name">Name</label>
            <input name="name" type="text" class="form-control" required />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input name="email" type="email" class="form-control" required />
          </div>

          <div class="form-group">
            <label for="message">Your Message</label>
            <textarea
              name="message"
              class="form-control"
              rows="4"
              required
            ></textarea>
          </div>

          <input
            type="submit"
            class="form control submit btn"
            value="Send Message"
          />
        </form>
      </div>
      <div class="contact-img-container">
        <img
          class="contact-img"
          src="https://res.cloudinary.com/dxdboxbyb/image/upload/v1611320370/portfolio/undraw_launch_day_4e04_qqhogh.svg"
          alt=""
        />
      </div>
    </div>
  </body>
</html>
