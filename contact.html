<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=devaaice-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="contact.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.13.0/css/all.css"
    />
    <title>Contact</title>
  </head>
  <body>
    <center>
      <nav class="navbar">
        <div class="nav-logo">
          <a href="/">
            <img
              class="navbar-logo"
              src="https://res.cloudinary.com/dxdboxbyb/image/upload/v1610988952/portfolio/ihxksogju1vefvisr2jz.svg"
              alt="logo"
          /></a>
        </div>
        <div class="nav-items">
          <ul>
            <li><a href="/cv.html">CV</a></li>
            <li>
              <a href="/projects.html">Projects</a>
            </li>
            <li><a href="/contact.html">Contact</a></li>
          </ul>
        </div>
      </nav>
    </center>

    <div class="contact-form">
      <form name="contact" id="contact-form " method="post" data-netlify="true">
        <input
          name="name"
          type="text"
          class="form-control"
          placeholder="Your name"
          required
        />
        <input
          name="email"
          type="email"
          class="form-control"
          placeholder="Your email-address"
          required
        />
        <textarea
          name="message"
          class="form-control"
          placeholder="Your Message"
          rows="4"
          required
        ></textarea>
        <input type="submit" class="form control submit" value="Send" />
      </form>
    </div>

    <script src="/contact.js"></script>
  </body>
</html>
